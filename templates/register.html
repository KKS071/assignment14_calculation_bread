<!-- File: templates/register.html -->
<!-- Purpose: Registration page — validates inputs and posts to /auth/register. -->
{% extends "base.html" %}

{% block title %}CalcApp – Register{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Create Account</h2>
  <div id="error-msg" class="alert alert-error" style="display:none"></div>
  <div id="success-msg" class="alert alert-success" style="display:none"></div>

  <div id="register-form">
    <div class="form-row">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input id="first_name" type="text" placeholder="First name" />
      </div>
      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input id="last_name" type="text" placeholder="Last name" />
      </div>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Choose a username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Min 8 chars, upper, lower, digit, symbol" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input id="confirm_password" type="password" placeholder="Repeat password" autocomplete="new-password" />
    </div>
    <button class="btn btn-primary btn-full" onclick="handleRegister()">Register</button>
  </div>

  <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleRegister() {
  const errorEl  = document.getElementById("error-msg");
  const successEl = document.getElementById("success-msg");
  errorEl.style.display = "none";
  successEl.style.display = "none";

  const first_name      = document.getElementById("first_name").value.trim();
  const last_name       = document.getElementById("last_name").value.trim();
  const email           = document.getElementById("email").value.trim();
  const username        = document.getElementById("username").value.trim();
  const password        = document.getElementById("password").value;
  const confirm_password = document.getElementById("confirm_password").value;

  if (!first_name || !last_name || !email || !username || !password || !confirm_password) {
    showError("All fields are required.");
    return;
  }
  if (password !== confirm_password) {
    showError("Passwords do not match.");
    return;
  }
  if (password.length < 8) {
    showError("Password must be at least 8 characters.");
    return;
  }

  try {
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ first_name, last_name, email, username, password, confirm_password }),
    });

    const data = await res.json();

    if (!res.ok) {
      const detail = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg).join("; ")
        : data.detail || "Registration failed.";
      showError(detail);
      return;
    }

    successEl.textContent = "Account created! Redirecting to login…";
    successEl.style.display = "block";
    setTimeout(() => window.location.href = "/login", 1500);
  } catch {
    showError("Network error. Please try again.");
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}
</script>
{% endblock %}
