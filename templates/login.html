<!-- File: templates/login.html -->
<!-- Purpose: Login page. All JS is self-contained and runs after DOMContentLoaded. -->
{% extends "base.html" %}
{% block title %}CalcApp — Login{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2"/>
      <line x1="8" y1="6" x2="16" y2="6"/>
      <line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/>
      <line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/>
      <line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/>
    </svg>
  </div>
  <h2>Login</h2>

  <div id="error-msg" class="alert alert-error" style="display:none"></div>

  <div class="form-group">
    <label for="username">Username or Email</label>
    <input id="username" type="text" placeholder="Enter username or email" autocomplete="username" />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
  </div>

  <button id="login-btn" class="btn btn-primary btn-full">Login</button>
  <p class="auth-link">No account? <a href="/register">Register</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {

  function showError(msg) {
    var el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  function setBusy(busy) {
    var btn = document.getElementById("login-btn");
    btn.disabled = busy;
    btn.textContent = busy ? "Logging in…" : "Login";
  }

  function doLogin() {
    showError("");
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;

    if (!username || !password) {
      showError("Please fill in all fields.");
      return;
    }

    setBusy(true);

    fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function (res) {
      return res.json().then(function (data) {
        if (!res.ok) {
          showError(data.detail || "Login failed. Check your credentials.");
          setBusy(false);
          return;
        }
        localStorage.setItem("access_token",  data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token || "");
        localStorage.setItem("user_id",       data.user_id || "");
        localStorage.setItem("username",      data.username || username);
        window.location.href = "/dashboard";
      });
    })
    .catch(function (err) {
      console.error("Login error:", err);
      showError("Network error — is the server running?");
      setBusy(false);
    });
  }

  document.getElementById("login-btn").addEventListener("click", doLogin);

  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doLogin();
  });

});
</script>
{% endblock %}
