<!-- File: templates/view_calculation.html -->
<!-- Purpose: Read — show full details of one calculation. Self-contained JS. -->
{% extends "base.html" %}
{% block title %}CalcApp — View Calculation{% endblock %}

{% block content %}
<div class="card detail-card">
  <h2>Calculation Details</h2>

  <div id="error-msg" class="alert alert-error" style="display:none"></div>
  <div id="detail-content"><p class="loading-text">Loading…</p></div>

  <div class="detail-actions">
    <a href="/dashboard" class="btn btn-ghost">← Back</a>
    <a id="edit-link" href="#" class="btn btn-warning" style="display:none">Edit</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {

  var token  = localStorage.getItem("access_token");
  if (!token) { window.location.href = "/login"; return; }

  var calcId = "{{ calc_id }}";

  var opLabels = {
    addition:       "Addition (+)",
    subtraction:    "Subtraction (-)",
    multiplication: "Multiplication (*)",
    division:       "Division (/)"
  };

  var opSymbols = {
    addition: "+", subtraction: "-", multiplication: "*", division: "/"
  };

  function showError(msg) {
    var el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  function apiFetch(url) {
    return fetch(url, {
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }
    });
  }

  function renderDetail(c) {
    var pills = c.inputs.map(function (n) {
      return '<span class="input-pill">' + n + "</span>";
    }).join(" ");

    var sym        = opSymbols[c.type] || "?";
    var expression = c.inputs.join(" " + sym + " ") + " = " + c.result;

    document.getElementById("detail-content").innerHTML =
      '<table class="detail-table">' +
        "<tr><th>ID</th>" +
            '<td style="font-size:.8rem;word-break:break-all">' + c.id + "</td></tr>" +
        "<tr><th>Operation</th>" +
            '<td><span class="badge badge-' + c.type + '">' + c.type + "</span>" +
            " — " + (opLabels[c.type] || c.type) + "</td></tr>" +
        "<tr><th>Inputs</th><td>" + pills + "</td></tr>" +
        "<tr><th>Expression</th><td><code>" + expression + "</code></td></tr>" +
        '<tr><th>Result</th><td class="result-value">' + c.result + "</td></tr>" +
        "<tr><th>Created</th><td>" + new Date(c.created_at).toLocaleString() + "</td></tr>" +
        "<tr><th>Updated</th><td>" + new Date(c.updated_at).toLocaleString() + "</td></tr>" +
      "</table>";

    var editLink         = document.getElementById("edit-link");
    editLink.href        = "/dashboard/edit/" + c.id;
    editLink.style.display = "inline-flex";
  }

  function loadCalculation() {
    apiFetch("/calculations/" + calcId)
      .then(function (res) {
        if (res.status === 401) { window.location.href = "/login"; return; }
        if (res.status === 404) {
          document.getElementById("detail-content").innerHTML =
            '<p class="error-text">Calculation not found.</p>';
          return;
        }
        return res.json().then(function (data) {
          if (!res.ok) {
            showError("Failed to load calculation.");
            document.getElementById("detail-content").innerHTML = "";
            return;
          }
          renderDetail(data);
        });
      })
      .catch(function (err) {
        console.error("View error:", err);
        showError("Network error — could not load calculation.");
        document.getElementById("detail-content").innerHTML = "";
      });
  }

  loadCalculation();

}); /* end DOMContentLoaded */
</script>
{% endblock %}
