<!-- File: templates/edit_calculation.html -->
<!-- Purpose: Edit — prefills multi-value form, then PUT to update calculation. -->
{% extends "base.html" %}
{% block title %}CalcApp — Edit Calculation{% endblock %}

{% block content %}
<div class="card detail-card">
  <h2>Edit Calculation</h2>
  <div id="error-msg"   class="alert alert-error"   style="display:none"></div>
  <div id="success-msg" class="alert alert-success" style="display:none"></div>

  <div id="edit-form" style="display:none">
    <div class="form-group">
      <label for="operation">Operation</label>
      <select id="operation" name="type">
        <option value="addition">Addition (+)</option>
        <option value="subtraction">Subtraction (−)</option>
        <option value="multiplication">Multiplication (×)</option>
        <option value="division">Division (÷)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="inputs-field">Numbers <span class="text-muted">(comma-separated, min 2)</span></label>
      <input id="inputs-field" type="text" placeholder="e.g. 10, 5, 2" oninput="renderPills('pills', this.value)" />
      <div class="inputs-preview" id="pills"></div>
    </div>
    <div class="form-actions">
      <a href="/dashboard" class="btn btn-ghost">Cancel</a>
      <button id="save-btn" class="btn btn-primary" onclick="saveCalculation()">Save Changes</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const token  = localStorage.getItem("access_token");
if (!token) window.location.href = "/login";
const calcId = "{{ calc_id }}";

async function loadForEdit() {
  const res = await authFetch(`/calculations/${calcId}`);
  if (!res) return;
  if (res.status === 404) { showMsg("error-msg", "Calculation not found."); return; }
  const c = await res.json();
  document.getElementById("operation").value  = c.type;
  const raw = c.inputs.join(", ");
  document.getElementById("inputs-field").value = raw;
  renderPills("pills", raw);
  document.getElementById("edit-form").style.display = "block";
}

async function saveCalculation() {
  showMsg("error-msg",   "");
  showMsg("success-msg", "");

  const type = document.getElementById("operation").value;
  const raw  = document.getElementById("inputs-field").value;
  const nums = parseInputs(raw);

  if (!nums) { showMsg("error-msg", "Enter at least 2 valid numbers separated by commas."); return; }
  if (type === "division" && nums.slice(1).some(n => n === 0)) {
    showMsg("error-msg", "Cannot divide by zero."); return;
  }

  const res  = await authFetch(`/calculations/${calcId}`, {
    method: "PUT",
    body: JSON.stringify({ type, inputs: nums }),
  });
  if (!res) return;
  const data = await res.json();

  if (!res.ok) {
    const msg = Array.isArray(data.detail) ? data.detail.map(e=>e.msg).join(" | ") : data.detail||"Update failed.";
    showMsg("error-msg", msg); return;
  }

  showMsg("success-msg", `Updated! New result: ${data.result}. Redirecting…`);
  setTimeout(() => window.location.href = "/dashboard", 1500);
}

loadForEdit();
</script>
{% endblock %}
