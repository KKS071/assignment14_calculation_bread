<!-- File: templates/edit_calculation.html -->
<!-- Purpose: Edit an existing calculation (BREAD: Edit) — prefills form, then PUT. -->
{% extends "base.html" %}

{% block title %}CalcApp – Edit Calculation{% endblock %}

{% block content %}
<div class="card detail-card">
  <h2>Edit Calculation</h2>
  <div id="error-msg" class="alert alert-error" style="display:none"></div>
  <div id="success-msg" class="alert alert-success" style="display:none"></div>

  <div id="edit-form" style="display:none">
    <div class="form-group">
      <label for="operation">Operation</label>
      <select id="operation" name="type">
        <option value="addition">Addition (+)</option>
        <option value="subtraction">Subtraction (−)</option>
        <option value="multiplication">Multiplication (×)</option>
        <option value="division">Division (÷)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="num1">Number 1</label>
      <input id="num1" name="num1" type="number" step="any" />
    </div>
    <div class="form-group">
      <label for="num2">Number 2</label>
      <input id="num2" name="num2" type="number" step="any" />
    </div>
    <div class="form-actions">
      <a href="/dashboard" class="btn btn-secondary">Cancel</a>
      <button id="save-btn" class="btn btn-primary" onclick="saveCalculation()">Save Changes</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const token  = localStorage.getItem("access_token");
if (!token) window.location.href = "/login";

const calcId = "{{ calc_id }}";

async function loadForEdit() {
  try {
    const res = await fetch(`/calculations/${calcId}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (res.status === 401) { window.location.href = "/login"; return; }
    if (res.status === 404) {
      showError("Calculation not found.");
      return;
    }
    const c = await res.json();
    document.getElementById("operation").value = c.type;
    document.getElementById("num1").value = c.inputs[0] ?? "";
    document.getElementById("num2").value = c.inputs[1] ?? "";
    document.getElementById("edit-form").style.display = "block";
  } catch {
    showError("Failed to load calculation.");
  }
}

async function saveCalculation() {
  document.getElementById("error-msg").style.display  = "none";
  document.getElementById("success-msg").style.display = "none";

  const type = document.getElementById("operation").value;
  const num1 = parseFloat(document.getElementById("num1").value);
  const num2 = parseFloat(document.getElementById("num2").value);

  if (isNaN(num1) || isNaN(num2)) {
    showError("Please enter valid numbers.");
    return;
  }
  if (type === "division" && num2 === 0) {
    showError("Cannot divide by zero.");
    return;
  }

  try {
    const res = await fetch(`/calculations/${calcId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify({ type, inputs: [num1, num2] }),
    });
    const data = await res.json();
    if (!res.ok) {
      const msg = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg).join("; ")
        : data.detail || "Update failed.";
      showError(msg);
      return;
    }
    const el = document.getElementById("success-msg");
    el.textContent = `Updated! New result: ${data.result}`;
    el.style.display = "block";
    setTimeout(() => window.location.href = "/dashboard", 1500);
  } catch {
    showError("Network error.");
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

loadForEdit();
</script>
{% endblock %}
