<!-- File: templates/dashboard.html -->
<!-- Purpose: Main dashboard — Add calculation (multi-value) + Browse list with Edit/Delete/View. -->
{% extends "base.html" %}
{% block title %}CalcApp — Dashboard{% endblock %}

{% block content %}
<div class="dash-header">
  <h2>Welcome, <span id="user-greeting">there</span>!</h2>
  <p class="subtitle">Add a calculation below, then manage your history.</p>
</div>

<!-- ── Add (POST /calculations) ────────────────────────────────────────── -->
<div class="card">
  <h3>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    New Calculation
  </h3>

  <div id="calc-error"   class="alert alert-error"   style="display:none"></div>
  <div id="calc-success" class="alert alert-success" style="display:none"></div>

  <div class="calc-form-grid">
    <div class="form-group" style="margin:0">
      <label for="operation">Operation</label>
      <select id="operation">
        <option value="addition">Addition (+)</option>
        <option value="subtraction">Subtraction (−)</option>
        <option value="multiplication">Multiplication (×)</option>
        <option value="division">Division (÷)</option>
      </select>
    </div>
    <div class="form-group" style="margin:0">
      <label for="inputs-field">Numbers <span class="text-muted">(comma-separated, min 2)</span></label>
      <input id="inputs-field" type="text" placeholder="e.g. 10, 5, 2" oninput="renderPills('pills', this.value)" />
      <div class="inputs-preview" id="pills"></div>
    </div>
    <div style="padding-bottom:0">
      <button id="calculate-btn" class="btn btn-primary" onclick="addCalculation()">Calculate &amp; Save</button>
    </div>
  </div>

  <div id="result-box" class="result-box" style="display:none">
    ✓ Result: <span id="result-value" class="result-value"></span>
  </div>
</div>

<!-- ── Browse (GET /calculations) ──────────────────────────────────────── -->
<div class="card">
  <h3>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Your Calculations
  </h3>
  <div id="calculations-list"><p class="loading-text">Loading…</p></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const token = localStorage.getItem("access_token");
if (!token) window.location.href = "/login";
document.getElementById("user-greeting").textContent = localStorage.getItem("username") || "there";

// ── Browse ────────────────────────────────────────────────────────────────
async function loadCalculations() {
  const res = await authFetch("/calculations");
  if (!res) return;
  if (!res.ok) { document.getElementById("calculations-list").innerHTML = '<p class="error-text">Failed to load.</p>'; return; }
  renderList(await res.json());
}

function renderList(calcs) {
  const el = document.getElementById("calculations-list");
  if (!calcs.length) {
    el.innerHTML = '<p class="empty-msg">No calculations yet — add one above!</p>';
    return;
  }
  el.innerHTML = `
    <table class="calc-table">
      <thead><tr>
        <th>Type</th><th>Inputs</th><th>Result</th><th>Date</th><th>Actions</th>
      </tr></thead>
      <tbody>${calcs.map(row).join("")}</tbody>
    </table>`;
}

function row(c) {
  const pills = c.inputs.map(n => `<span class="input-pill">${n}</span>`).join(" ");
  return `
    <tr class="calculation-row" data-id="${c.id}">
      <td>${typeBadge(c.type)}</td>
      <td>${pills}</td>
      <td class="result-cell"><strong>${c.result}</strong></td>
      <td>${new Date(c.created_at).toLocaleDateString()}</td>
      <td class="action-btns">
        <a href="/dashboard/view/${c.id}" class="btn btn-sm btn-info view-btn">View</a>
        <a href="/dashboard/edit/${c.id}" class="btn btn-sm btn-warning edit-btn">Edit</a>
        <button class="btn btn-sm btn-danger delete-btn" data-action="delete" onclick="deleteCalc('${c.id}',this)">Delete</button>
      </td>
    </tr>`;
}

// ── Add ───────────────────────────────────────────────────────────────────
async function addCalculation() {
  showMsg("calc-error",   "");
  showMsg("calc-success", "");
  document.getElementById("result-box").style.display = "none";

  const type = document.getElementById("operation").value;
  const raw  = document.getElementById("inputs-field").value;
  const nums = parseInputs(raw);

  if (!nums) { showMsg("calc-error", "Enter at least 2 valid numbers separated by commas."); return; }
  if (type === "division" && nums.slice(1).some(n => n === 0)) {
    showMsg("calc-error", "Cannot divide by zero."); return;
  }

  const res  = await authFetch("/calculations", {
    method: "POST",
    body: JSON.stringify({ type, inputs: nums }),
  });
  if (!res) return;
  const data = await res.json();

  if (!res.ok) {
    const msg = Array.isArray(data.detail) ? data.detail.map(e => e.msg).join(" | ") : data.detail || "Failed.";
    showMsg("calc-error", msg); return;
  }

  document.getElementById("result-value").textContent = data.result;
  document.getElementById("result-box").style.display  = "flex";
  showMsg("calc-success", `✓ Saved! ${data.type} of [${data.inputs.join(", ")}] = ${data.result}`);
  document.getElementById("inputs-field").value = "";
  document.getElementById("pills").innerHTML    = "";
  loadCalculations();
}

// ── Delete ────────────────────────────────────────────────────────────────
async function deleteCalc(id, btn) {
  if (!confirm("Delete this calculation?")) return;
  btn.disabled = true;
  const res = await authFetch(`/calculations/${id}`, { method: "DELETE" });
  if (!res) return;
  if (res.ok) { loadCalculations(); }
  else {
    const d = await res.json();
    alert(d.detail || "Delete failed.");
    btn.disabled = false;
  }
}

loadCalculations();
</script>
{% endblock %}
