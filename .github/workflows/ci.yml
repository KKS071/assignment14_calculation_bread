# File: .github/workflows/ci.yml
# Purpose: CI/CD pipeline — run tests, Trivy scan, push Docker image to Docker Hub.
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Step 1: Run pytest + coverage
  # ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fastapi_db
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fastapi_test_db
      JWT_SECRET_KEY: "ci-secret-key-for-testing-min-32-chars!!"
      JWT_REFRESH_SECRET_KEY: "ci-refresh-key-for-testing-min-32-chars!!"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BCRYPT_ROUNDS: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE fastapi_test_db;" || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/unit/ tests/integration/ \
            --cov=app --cov-report=term-missing --cov-report=xml \
            -v

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          pytest tests/e2e/ -v -m e2e || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Step 2: Trivy vulnerability scan
  # ─────────────────────────────────────────────────────────────
  trivy-scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t kks59/601_module14:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "kks59/601_module14:scan"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  # ─────────────────────────────────────────────────────────────
  # Step 3: Push Docker image to Docker Hub
  # ─────────────────────────────────────────────────────────────
  push-image:
    needs: trivy-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            kks59/601_module14:latest
            kks59/601_module14:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=kks59/601_module14:cache
          cache-to: type=inline,mode=max
